<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TwoSidedNews AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 400px;
      min-height: 300px;
      font-family: 'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif;
      background: #f8f5f0;
      color: #0f0f0f;
      font-size: 13px;
    }

    /* Header */
    .header {
      background: #0f0f0f;
      color: #f8f5f0;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-weight: 800;
      font-size: 15px;
      letter-spacing: -0.3px;
    }
    .logo .for { color: #60a5fa; }
    .logo .against { color: #f87171; }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #10b981;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Top bar */
    .top-bar {
      background: #1a56db;
      color: white;
      padding: 4px 14px;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-family: monospace;
    }

    /* Body */
    .body { padding: 14px; }

    /* URL display */
    .url-display {
      background: white;
      border: 1px solid #e5e7eb;
      padding: 8px 12px;
      margin-bottom: 12px;
      font-family: monospace;
      font-size: 10px;
      color: #6b7280;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Input */
    .input-group {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .input-group input {
      flex: 1;
      border: 2px solid #0f0f0f;
      padding: 7px 10px;
      font-size: 12px;
      font-family: inherit;
      outline: none;
      background: white;
    }
    .input-group input:focus { border-color: #1a56db; }
    .btn-analyze {
      background: #0f0f0f;
      color: white;
      border: none;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
    }
    .btn-analyze:hover { background: #374151; }
    .btn-analyze:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Use current URL button */
    .btn-current {
      width: 100%;
      background: white;
      border: 1px dashed #d1d5db;
      padding: 6px;
      font-size: 11px;
      color: #6b7280;
      cursor: pointer;
      font-family: monospace;
      margin-bottom: 12px;
    }
    .btn-current:hover { border-color: #0f0f0f; color: #0f0f0f; }

    /* Loading */
    .loading {
      text-align: center;
      padding: 24px 14px;
    }
    .loading-spinner {
      display: flex;
      justify-content: center;
      gap: 5px;
      margin-bottom: 10px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #0f0f0f;
      animation: bounce 0.9s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-8px); }
    }
    .loading-step {
      font-size: 11px;
      color: #6b7280;
      font-family: monospace;
    }

    /* Error */
    .error {
      background: #fee2e2;
      border-left: 3px solid #dc2626;
      padding: 10px 12px;
      font-size: 12px;
      color: #991b1b;
      margin-bottom: 10px;
    }

    /* Section */
    .section {
      margin-bottom: 12px;
    }
    .section-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }
    .section-bar {
      width: 3px;
      height: 16px;
      flex-shrink: 0;
    }
    .bar-for { background: #1a56db; }
    .bar-against { background: #dc2626; }
    .bar-neutral { background: #059669; }
    .section-label {
      font-size: 9px;
      font-family: monospace;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #6b7280;
    }
    .section-title {
      font-weight: 700;
      font-size: 12px;
      color: #0f0f0f;
    }

    /* Article card */
    .article-card {
      background: white;
      border: 1px solid #e5e7eb;
      padding: 9px 11px;
      margin-bottom: 6px;
    }
    .article-card:last-child { margin-bottom: 0; }
    .article-title {
      font-weight: 600;
      font-size: 12px;
      color: #0f0f0f;
      line-height: 1.4;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .article-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .article-source {
      font-size: 10px;
      font-family: monospace;
      color: #9ca3af;
    }
    .article-link {
      font-size: 10px;
      font-family: monospace;
      text-decoration: none;
    }
    .link-for { color: #1a56db; }
    .link-against { color: #dc2626; }
    .link-for:hover { color: #1e40af; }
    .link-against:hover { color: #991b1b; }

    /* Analysis */
    .analysis-box {
      background: white;
      border: 1px solid #d1fae5;
      border-left: 3px solid #059669;
      padding: 10px 12px;
      font-size: 11px;
      color: #374151;
      line-height: 1.6;
      max-height: 120px;
      overflow-y: auto;
    }

    /* Footer */
    .footer {
      border-top: 1px solid #e5e7eb;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer-text {
      font-size: 10px;
      font-family: monospace;
      color: #9ca3af;
    }
    .btn-open-web {
      font-size: 10px;
      font-family: monospace;
      color: #1a56db;
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
    }
    .btn-open-web:hover { color: #1e40af; }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 10px;
      background: white;
      border: 1px solid #e5e7eb;
      padding: 6px 10px;
      margin-bottom: 10px;
    }
    .stat {
      font-size: 10px;
      font-family: monospace;
    }
    .stat span { font-weight: 700; }
    .stat-for span { color: #1a56db; }
    .stat-against span { color: #dc2626; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <span class="for">TWO</span>|<span class="against">SIDED</span> NEWS
    </div>
    <div class="status-dot" id="statusDot"></div>
  </div>
  <div class="top-bar">AI-Powered Balanced News Analysis</div>

  <div class="body">
    <!-- Input section -->
    <div id="inputSection">
      <div class="url-display" id="currentUrl">Loading page URL...</div>
      <button class="btn-current" id="btnUseUrl">
        📰 Analyze current page URL
      </button>
      <div class="input-group">
        <input
          type="text"
          id="topicInput"
          placeholder="Or enter a topic..."
        />
        <button class="btn-analyze" id="btnAnalyze">Analyze</button>
      </div>
    </div>

    <!-- Loading section -->
    <div id="loadingSection" style="display:none">
      <div class="loading">
        <div class="loading-spinner">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <div class="loading-step" id="loadingStep">Generating AI queries...</div>
      </div>
    </div>

    <!-- Error section -->
    <div id="errorSection" style="display:none">
      <div class="error" id="errorMsg"></div>
      <button class="btn-analyze" id="btnRetry" style="width:100%">Try Again</button>
    </div>

    <!-- Results section -->
    <div id="resultsSection" style="display:none">
      <!-- Stats -->
      <div class="stats-bar">
        <div class="stat stat-for">FOR: <span id="forCount">0</span></div>
        <div class="stat stat-against">AGAINST: <span id="againstCount">0</span></div>
        <div class="stat" style="color:#6b7280">Analyzed: <span id="totalCount">0</span></div>
      </div>

      <!-- FOR articles -->
      <div class="section">
        <div class="section-header">
          <div class="section-bar bar-for"></div>
          <div>
            <div class="section-label">Supporting Perspective</div>
            <div class="section-title">FOR</div>
          </div>
        </div>
        <div id="forArticles"></div>
      </div>

      <!-- AGAINST articles -->
      <div class="section">
        <div class="section-header">
          <div class="section-bar bar-against"></div>
          <div>
            <div class="section-label">Critical Perspective</div>
            <div class="section-title">AGAINST</div>
          </div>
        </div>
        <div id="againstArticles"></div>
      </div>

      <!-- Neutral analysis -->
      <div class="section">
        <div class="section-header">
          <div class="section-bar bar-neutral"></div>
          <div>
            <div class="section-label">Neutral Analysis</div>
            <div class="section-title">AI Fact-Check</div>
          </div>
        </div>
        <div class="analysis-box" id="analysisText"></div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="footer-text" id="footerStatus">Ready</span>
    <button class="btn-open-web" id="btnOpenWeb">Open in Web App ↗</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
